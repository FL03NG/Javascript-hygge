<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FBI Wanted</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }

        .hero-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        .page-title {
            font-weight: 800;
            letter-spacing: 1px;
        }

        .page-subtitle {
            color: #cbd5e1;
        }

        .search-box {
            max-width: 700px;
            margin: 0 auto;
        }

        .form-control {
            border-radius: 12px;
            padding: 0.9rem 1rem;
            border: none;
        }

        .wanted-card {
            background: white;
            color: #111827;
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 24px rgba(0,0,0,0.20);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .wanted-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 30px rgba(0,0,0,0.25);
        }

        .image-wrapper {
            background: #e5e7eb;
            min-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .wanted-image {
            width: 100%;
            max-height: 420px;
            object-fit: contain;
            border-radius: 12px;
        }

        .info-section {
            padding: 2rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .person-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: #0f172a;
        }

        .badge-status {
            display: inline-block;
            background: #dc3545;
            color: white;
            font-size: 0.85rem;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            margin-bottom: 1rem;
        }

        .info-row {
            margin-bottom: 0.7rem;
            font-size: 1rem;
        }

        .info-label {
            font-weight: 700;
            color: #1f2937;
        }

        .info-value {
            color: #4b5563;
        }

        .desc-box {
            background: #f8fafc;
            border-left: 4px solid #0f172a;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            color: #374151;
        }

        .btn-fbi {
            margin-top: 1.5rem;
            width: fit-content;
            border-radius: 12px;
            padding: 0.7rem 1.2rem;
            font-weight: 600;
        }

        #loading {
            color: #e2e8f0;
            font-size: 1.1rem;
        }

        #noResults {
            display: none;
        }

        .stats-text {
            color: #cbd5e1;
        }

        @media (max-width: 767px) {
            .person-title {
                font-size: 1.4rem;
            }

            .info-section {
                padding: 1.25rem;
            }

            .image-wrapper {
                min-height: 220px;
            }

            .wanted-image {
                max-height: 320px;
            }
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="hero-box text-center mb-5">
            <h1 class="page-title mb-3">FBI Wanted Posters</h1>
            <p class="page-subtitle mb-4">
                Search wanted persons and view their information in a clean layout.
            </p>

            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    class="form-control form-control-lg"
                    placeholder="Search by name, nationality, gender, race or status..."
                />
            </div>

            <p class="stats-text mt-3 mb-0" id="resultCount">Loading data...</p>
        </div>

        <div id="loading" class="text-center mb-4">Fetching FBI data...</div>

        <div id="noResults" class="alert alert-warning text-center">
            No persons found.
        </div>

        <div id="results" class="row g-4"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        const resultsDiv = document.getElementById("results");
        const searchInput = document.getElementById("searchInput");
        const loadingDiv = document.getElementById("loading");
        const noResultsDiv = document.getElementById("noResults");
        const resultCount = document.getElementById("resultCount");

        let allPersons = [];

        async function fetchWantedPersons() {
            try {
                loadingDiv.style.display = "block";
                resultsDiv.innerHTML = "";

                const response = await axios.get("https://api.fbi.gov/wanted/v1/list");
                allPersons = response.data.items;

                renderCards(allPersons);
            } catch (error) {
                console.error("Error fetching data:", error);
                resultsDiv.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger text-center">
                            Could not fetch FBI data.
                        </div>
                    </div>
                `;
            } finally {
                loadingDiv.style.display = "none";
            }
        }

        function renderCards(persons) {
            resultsDiv.innerHTML = "";

            if (persons.length === 0) {
                noResultsDiv.style.display = "block";
                resultCount.textContent = "0 results";
                return;
            }

            noResultsDiv.style.display = "none";
            resultCount.textContent = persons.length + " result(s) shown";

            persons.forEach(function (person) {
                const title = person.title || "Unknown";
                const status = person.status || "Unknown";
                const gender = person.sex || "Unknown";
                const nationality = person.nationality || "Unknown";
                const race = person.race || "Unknown";
                const hair = person.hair || "Unknown";
                const eyes = person.eyes || "Unknown";
                const warningMessage = person.warning_message || "No description available.";
                const image = person.images && person.images.length > 0
                    ? person.images[0].original
                    : "https://via.placeholder.com/500x700?text=No+Image";
                const url = person.url || "#";

                const col = document.createElement("div");
                col.className = "col-12";

                col.innerHTML = `
                    <div class="card wanted-card">
                        <div class="row g-0">
                            <div class="col-md-4">
                                <div class="image-wrapper h-100">
                                    <img src="${image}" alt="${title}" class="wanted-image">
                                </div>
                            </div>

                            <div class="col-md-8">
                                <div class="info-section">
                                    <h2 class="person-title">${title}</h2>
                                    <span class="badge-status">${status}</span>

                                    <div class="info-row">
                                        <span class="info-label">Gender:</span>
                                        <span class="info-value">${gender}</span>
                                    </div>

                                    <div class="info-row">
                                        <span class="info-label">Nationality:</span>
                                        <span class="info-value">${nationality}</span>
                                    </div>

                                    <div class="info-row">
                                        <span class="info-label">Race:</span>
                                        <span class="info-value">${race}</span>
                                    </div>

                                    <div class="info-row">
                                        <span class="info-label">Hair:</span>
                                        <span class="info-value">${hair}</span>
                                    </div>

                                    <div class="info-row">
                                        <span class="info-label">Eyes:</span>
                                        <span class="info-value">${eyes}</span>
                                    </div>

                                    <div class="desc-box">
                                        <strong>Description:</strong><br>
                                        ${warningMessage}
                                    </div>

                                    <a href="${url}" target="_blank" class="btn btn-dark btn-fbi">
                                        View FBI Poster
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                resultsDiv.appendChild(col);
            });
        }

        function filterPersons() {
            const searchText = searchInput.value.toLowerCase().trim();

            const filteredPersons = allPersons.filter(function (person) {
                const title = (person.title || "").toLowerCase();
                const nationality = (person.nationality || "").toLowerCase();
                const gender = (person.sex || "").toLowerCase();
                const status = (person.status || "").toLowerCase();
                const race = (person.race || "").toLowerCase();
                const hair = (person.hair || "").toLowerCase();
                const eyes = (person.eyes || "").toLowerCase();

                return (
                    title.includes(searchText) ||
                    nationality.includes(searchText) ||
                    gender.includes(searchText) ||
                    status.includes(searchText) ||
                    race.includes(searchText) ||
                    hair.includes(searchText) ||
                    eyes.includes(searchText)
                );
            });

            renderCards(filteredPersons);
        }

        searchInput.addEventListener("input", filterPersons);

        fetchWantedPersons();
    </script>
</body>
</html>
