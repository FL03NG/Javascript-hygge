<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous">
    <!-- Vue 3 global build -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <!-- root element for Vue -->
    <div id="app" class="m-5">
        <div class="input-group">
            <input type="number" class="form-control" v-model.number="number1" placeholder="Number">
            <select class="form-select" v-model="operation">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">×</option>
                <option value="/">÷</option>
            </select>
            <input type="number" class="form-control" v-model.number="number2" placeholder="Number">
            <button class="btn btn-primary" v-on:click="calculate">=</button>
        </div>
        <div class="mt-3"><strong>Result:</strong> {{ result }}</div>
    </div>
    <!-- Bootstrap JS bundle (optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-..." crossorigin="anonymous"></script>

    <script src="Index.js"></script>
</body>
</html>
